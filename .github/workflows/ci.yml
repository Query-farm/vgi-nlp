name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['README.md']
  pull_request:
    branches: [main]
    paths-ignore: ['README.md']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Install from PyPI rather than the local ../vgi-python path used for
      # `uv run` during development, so CI is self-contained.
      - name: Install dependencies
        run: |
          uv venv
          uv pip install vgi-python "spacy>=3.7" fasttext-wheel vaderSentiment pytest
          uv pip install -e . --no-deps

      - name: Download spaCy model
        run: uv run python -m spacy download en_core_web_sm

      - name: Download fastText language-ID model
        run: |
          mkdir -p ~/.cache/vgi-nlp
          curl -L -o ~/.cache/vgi-nlp/lid.176.ftz \
            https://dl.fbaipublicfiles.com/fasttext/supervised-models/lid.176.ftz

      - name: Run tests
        run: uv run pytest

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install tooling
        run: |
          uv venv
          uv pip install vgi-python "spacy>=3.7" fasttext-wheel vaderSentiment ruff mypy
          uv pip install -e . --no-deps

      - name: Check linting
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy vgi_nlp
